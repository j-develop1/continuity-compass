<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Report - Continuity Compass™</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #F8F8F6;
    display: flex;
    justify-content: center;
    padding: 40px 20px;
  }

  .card {
    background: white;
    padding: 40px;
    border-radius: 24px;
    max-width: 800px;
    width: 100%;
  }

  .score {
    font-size: 64px;
    font-weight: 600;
    color: #0A84FF;
  }

  .tag {
    display: inline-block;
    padding: 8px 14px;
    border-radius: 999px;
    margin-top: 10px;
  }

  .green { background:#E7F8EE; color:#1A7F37; }
  .yellow { background:#FFF6D6; color:#8A6D1E; }
  .orange { background:#FFE8D6; color:#A34A00; }
  .red { background:#FFE2E2; color:#B42318; }

  h3 {
    margin-top: 30px;
  }

  ul {
    line-height: 1.6;
    color: #444;
  }

  .section {
    margin-top: 30px;
    padding-top: 20px;
    border-top: 1px solid #E5E5EA;
  }
</style>
</head>

<body>

<div class="card">

  <h1>Your Continuity Compass Report™</h1>

  <div class="score" id="score">0</div>
  <div class="tag" id="tag">-</div>

  <div class="section">
    <h3>Key Recommendations</h3>
    <ul id="advice"></ul>
  </div>

  <div class="section">
    <h3>Recommended Documents</h3>
    <ul id="docs"></ul>
  </div>

</div>

<script>

const scores = JSON.parse(localStorage.getItem("compassScores")) || {};

const total = Object.values(scores).reduce((a,b)=>a+(b||0),0);

document.getElementById("score").innerText = total;

let label = "";
let tagClass = "";
let advice = [];
let docs = [];

if (total <= 15) {
  label = "Resilient";
  tagClass = "green";
  advice = [
    "Maintain current systems",
    "Run quarterly stress tests",
    "Keep documentation updated"
  ];
  docs = [
    "Operational Efficiency Playbook",
    "Advanced Risk Monitoring Guide",
    "Scaling Safely Framework"
  ];
}

else if (total <= 25) {
  label = "Stable";
  tagClass = "yellow";
  advice = [
    "Reduce dependency on single platforms",
    "Build backup communication channels",
    "Improve data backup routines"
  ];
  docs = [
    "Business Stability Handbook",
    "Backup Systems Setup Guide",
    "Dependency Reduction Framework"
  ];
}

else if (total <= 35) {
  label = "Vulnerable";
  tagClass = "orange";
  advice = [
    "Diversify income streams immediately",
    "Create recovery plan",
    "Secure all access systems"
  ];
  docs = [
    "Business Recovery Toolkit",
    "Revenue Diversification Guide",
    "Crisis Response Playbook"
  ];
}

else {
  label = "Critical";
  tagClass = "red";
  advice = [
    "Stop scaling until stable",
    "Build backup income channel",
    "Implement continuity plan immediately"
  ];
  docs = [
    "Emergency Business Survival Plan",
    "48-Hour Recovery Guide",
    "Critical Systems Restart Manual"
  ];
}

document.getElementById("tag").innerText = label;
document.getElementById("tag").classList.add(tagClass);

const adviceList = document.getElementById("advice");
advice.forEach(a => {
  const li = document.createElement("li");
  li.innerText = a;
  adviceList.appendChild(li);
});

const docList = document.getElementById("docs");
docs.forEach(d => {
  const li = document.createElement("li");
  li.innerText = d;
  docList.appendChild(li);
});

</script>

</body>
</html>
