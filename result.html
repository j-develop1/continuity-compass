<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Compass Score™</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #F8F8F6;
      color: #1D1D1F;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 24px;
      text-align: center;
      max-width: 500px;
      width: 90%;
    }

    .score {
      font-size: 72px;
      font-weight: 600;
      color: #0A84FF;
      margin: 20px 0;
    }

    p {
      color: #6E6E73;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      background: #0A84FF;
      color: white;
      padding: 12px 20px;
      border-radius: 14px;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Your Compass Score™</h1>

    <div class="score" id="score">0</div>

    <p>
      This is your initial resilience snapshot based on your answers.
    </p>

    <a href="index.html" class="btn">Back to Home</a>
  </div>

  <script>
    const score = localStorage.getItem("compassScore") || 0;
    document.getElementById("score").innerText = score * 20;
  </script>

</body>
</html>
