<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Compass Report™</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;600&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #F8F8F6;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .card {
    background: white;
    padding: 40px;
    border-radius: 24px;
    width: 90%;
    max-width: 700px;
  }

  .score {
    font-size: 64px;
    color: #0A84FF;
    font-weight: 600;
  }

  .tag {
    display: inline-block;
    padding: 8px 14px;
    border-radius: 999px;
    margin-top: 10px;
  }

  .green { background: #E7F8EE; color: #1A7F37; }
  .yellow { background: #FFF6D6; color: #8A6D1E; }
  .orange { background: #FFE8D6; color: #A34A00; }
  .red { background: #FFE2E2; color: #B42318; }

  ul {
    margin-top: 20px;
    line-height: 1.6;
  }

  .btn {
    display: inline-block;
    margin-top: 20px;
    background: #0A84FF;
    color: white;
    padding: 12px 18px;
    border-radius: 14px;
    text-decoration: none;
  }
</style>
</head>

<body>

<div class="card">

<h1>Your Compass Score™</h1>
<div class="score" id="score">0</div>

<div class="tag" id="tag">-</div>

<ul id="advice"></ul>

<a href="index.html" class="btn">Retake Assessment</a>

</div>

<script>
const scores = JSON.parse(localStorage.getItem("compassScores")) || {};

const total = Object.values(scores).reduce((a,b)=>a+(b||0),0);

document.getElementById("score").innerText = total;

let label = "";
let tagClass = "";
let advice = [];

if (total <= 15) {
  label = "Resilient";
  tagClass = "green";
  advice = ["Maintain systems", "Quarterly stress tests", "Document processes"];
} else if (total <= 25) {
  label = "Stable";
  tagClass = "yellow";
  advice = ["Reduce dependencies", "Improve backups", "Build email list"];
} else if (total <= 35) {
  label = "Vulnerable";
  tagClass = "orange";
  advice = ["Diversify income", "Create recovery plan", "Secure access"];
} else {
  label = "Critical";
  tagClass = "red";
  advice = ["Stabilise systems first", "Build backup channel", "Reduce risk fast"];
}

const tag = document.getElementById("tag");
tag.innerText = label;
tag.classList.add(tagClass);

const ul = document.getElementById("advice");
advice.forEach(a => {
  const li = document.createElement("li");
  li.innerText = a;
  ul.appendChild(li);
});
</script>

</body>
</html>
