<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Continuity Compass™ Assessment</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #F8F8F6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #1D1D1F;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 24px;
      width: 90%;
      max-width: 650px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    h1 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    .progress {
      font-size: 14px;
      color: #6E6E73;
      margin-bottom: 20px;
    }

    .option {
      display: block;
      padding: 14px;
      margin-bottom: 12px;
      border: 1px solid #E5E5EA;
      border-radius: 14px;
      cursor: pointer;
      transition: 0.2s;
    }

    .option:hover {
      border-color: #0A84FF;
      background: #F0F7FF;
    }

    .next {
      margin-top: 20px;
      display: inline-block;
      background: #0A84FF;
      color: white;
      padding: 12px 20px;
      border-radius: 14px;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="card">

  <div class="progress" id="progress">Question 1 of 1</div>

  <h1 id="question">Loading...</h1>

  <div id="options"></div>

  <a href="#" class="next" id="nextBtn">Next →</a>

</div>

<script>
const questions = [
  {
    text: "How many income streams does your business have?",
    category: "dependence",
    options: [
      { text: "1 main source", score: 5 },
      { text: "2 sources", score: 4 },
      { text: "3 sources", score: 2 },
      { text: "4+ diversified", score: 1 }
    ]
  },
  {
    text: "How reliant are you on one platform?",
    category: "digital",
    options: [
      { text: "Completely reliant", score: 5 },
      { text: "Mostly reliant", score: 4 },
      { text: "Balanced", score: 2 },
      { text: "Platform-independent", score: 1 }
    ]
  },
  {
    text: "Do you regularly back up business data?",
    category: "data",
    options: [
      { text: "Never", score: 5 },
      { text: "Occasionally", score: 3 },
      { text: "Automated backups", score: 1 }
    ]
  }
];

let current = 0;

let scores = {
  dependence: 0,
  digital: 0,
  data: 0,
  operations: 0,
  financial: 0,
  recovery: 0,
  communication: 0
};

let selectedScore = null;
let selectedCategory = null;

function loadQuestion() {
  const q = questions[current];

  document.getElementById("question").innerText = q.text;
  document.getElementById("progress").innerText = `Question ${current + 1} of ${questions.length}`;

  selectedCategory = q.category;

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  q.options.forEach(opt => {
    const div = document.createElement("div");
    div.className = "option";
    div.innerText = opt.text;

    div.onclick = () => {
      selectedScore = opt.score;
      scores[q.category] += opt.score;
    };

    optionsDiv.appendChild(div);
  });
}

document.getElementById("nextBtn").onclick = (e) => {
  e.preventDefault();

  if (selectedScore === null) {
    alert("Please select an option");
    return;
  }

  selectedScore = null;

  current++;

  if (current >= questions.length) {
    localStorage.setItem("compassScores", JSON.stringify(scores));
    window.location.href = "result.html";
  } else {
    loadQuestion();
  }
};

loadQuestion();
</script>

</body>
</html>
