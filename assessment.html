<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Continuity Compass™ - Assessment</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #F8F8F6;
      color: #1D1D1F;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 24px;
      max-width: 600px;
      width: 90%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    p {
      color: #6E6E73;
      margin-bottom: 30px;
    }

    .option {
      display: block;
      padding: 14px;
      margin-bottom: 12px;
      border: 1px solid #E5E5EA;
      border-radius: 14px;
      cursor: pointer;
      transition: 0.2s;
    }

    .option:hover {
      border-color: #0A84FF;
      background: #F0F7FF;
    }

    .next {
      margin-top: 20px;
      display: inline-block;
      background: #0A84FF;
      color: white;
      padding: 12px 20px;
      border-radius: 14px;
      text-decoration: none;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="card">

    <h1>How dependent is your business on a single platform?</h1>

    <p>Be honest — this helps us calculate your resilience score.</p>

    <label class="option">
      <input type="radio" name="q1"> Completely dependent (Instagram / one channel)
    </label>

    <label class="option">
      <input type="radio" name="q1"> Mostly dependent on one main channel
    </label>

    <label class="option">
      <input type="radio" name="q1"> Balanced across multiple channels
    </label>

    <label class="option">
      <input type="radio" name="q1"> Fully diversified business
    </label>

    <a href="#" class="next">Next →</a>

  </div>

</body>
</html>
