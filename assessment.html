<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assessment - Continuity Compass™</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #F8F8F6;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    color: #1D1D1F;
  }

  .card {
    background: white;
    padding: 40px;
    border-radius: 24px;
    width: 90%;
    max-width: 650px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
  }

  h1 {
    font-size: 20px;
  }

  .progress {
    font-size: 14px;
    color: #6E6E73;
    margin: 10px 0;
  }

  .progress-container {
    width: 100%;
    height: 6px;
    background: #E5E5EA;
    border-radius: 999px;
    margin-bottom: 15px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    width: 0%;
    background: #0A84FF;
    transition: width 0.3s ease;
  }

  .option {
    display: block;
    padding: 14px;
    margin-bottom: 12px;
    border: 1px solid #E5E5EA;
    border-radius: 14px;
    cursor: pointer;
    transition: 0.2s;
  }

  .option:hover {
    border-color: #0A84FF;
    background: #F0F7FF;
  }

  .next {
    margin-top: 20px;
    display: inline-block;
    background: #0A84FF;
    color: white;
    padding: 12px 20px;
    border-radius: 14px;
    text-decoration: none;
  }
</style>
</head>

<body>

<div class="card">

  <div class="progress-container">
    <div class="progress-bar" id="bar"></div>
  </div>

  <div class="progress" id="progress">Question 1</div>

  <h1 id="question">Loading...</h1>

  <div id="options"></div>

  <a href="#" class="next" id="nextBtn">Next →</a>

</div>

<script>

const questions = [
  { text: "How many income streams does your business have?", category: "dependence", options: [
    { text: "1 main source", score: 5 },
    { text: "2 sources", score: 4 },
    { text: "3 sources", score: 2 },
    { text: "4+ diversified", score: 1 }
  ]},

  { text: "How reliant are you on one platform?", category: "digital", options: [
    { text: "Completely reliant", score: 5 },
    { text: "Mostly reliant", score: 4 },
    { text: "Balanced", score: 2 },
    { text: "Independent", score: 1 }
  ]},

  { text: "Do you regularly back up business data?", category: "data", options: [
    { text: "Never", score: 5 },
    { text: "Occasionally", score: 3 },
    { text: "Automated backups", score: 1 }
  ]},

  { text: "Can someone else run your business if you're unavailable?", category: "operations", options: [
    { text: "No", score: 5 },
    { text: "Partially", score: 3 },
    { text: "Yes", score: 1 }
  ]},

  { text: "How many months could you survive with no income?", category: "financial", options: [
    { text: "<1 month", score: 5 },
    { text: "1–2 months", score: 4 },
    { text: "3–6 months", score: 3 },
    { text: "6+ months", score: 1 }
  ]},

  { text: "Do you have a recovery plan if systems fail?", category: "recovery", options: [
    { text: "No", score: 5 },
    { text: "Some idea", score: 3 },
    { text: "Written plan", score: 1 }
  ]},

  { text: "Can you reach your audience if your main platform disappears?", category: "comms", options: [
    { text: "No", score: 5 },
    { text: "Partially", score: 3 },
    { text: "Yes", score: 1 }
  ]}
];

let current = 0;
let selected = false;

let scores = {
  dependence: 0,
  digital: 0,
  data: 0,
  operations: 0,
  financial: 0,
  recovery: 0,
  comms: 0
};

function loadQuestion() {
  const q = questions[current];

  document.getElementById("question").innerText = q.text;
  document.getElementById("progress").innerText =
    `Question ${current + 1} of ${questions.length}`;

  document.getElementById("bar").style.width =
    ((current) / questions.length) * 100 + "%";

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";
  selected = false;

  q.options.forEach(opt => {
    const div = document.createElement("div");
    div.className = "option";
    div.innerText = opt.text;

    div.onclick = () => {
      document.querySelectorAll('.option').forEach(o => {
        o.style.borderColor = "#E5E5EA";
        o.style.background = "white";
      });

      div.style.borderColor = "#0A84FF";
      div.style.background = "#F0F7FF";

      selected = true;
      scores[q.category] += opt.score;
    };

    optionsDiv.appendChild(div);
  });
}

document.getElementById("nextBtn").onclick = (e) => {
  e.preventDefault();

  if (!selected) {
    alert("Please select an option");
    return;
  }

  current++;

  if (current >= questions.length) {
    document.getElementById("bar").style.width = "100%";
    localStorage.setItem("compassScores", JSON.stringify(scores));
    window.location.href = "result.html";
  } else {
    loadQuestion();
  }
};

loadQuestion();

</script>

</body>
</html>
