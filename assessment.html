<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Continuity Compass™ Assessment</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #F8F8F6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #1D1D1F;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 24px;
      width: 90%;
      max-width: 650px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    h1 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    .progress {
      font-size: 14px;
      color: #6E6E73;
      margin-bottom: 20px;
    }

    .option {
      display: block;
      padding: 14px;
      margin-bottom: 12px;
      border: 1px solid #E5E5EA;
      border-radius: 14px;
      cursor: pointer;
      transition: 0.2s;
    }

    .option:hover {
      border-color: #0A84FF;
      background: #F0F7FF;
    }

    .next {
      margin-top: 20px;
      display: inline-block;
      background: #0A84FF;
      color: white;
      padding: 12px 20px;
      border-radius: 14px;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="card">

  <div class="progress" id="progress">Question 1 of 1</div>

  <h1 id="question">Loading...</h1>

  <div id="options"></div>

  <a href="#" class="next" id="nextBtn">Next →</a>

</div>

<script>
const questions = [
  // BUSINESS DEPENDENCE
  { text: "How many income streams does your business have?", category: "dependence", options: [
    { text: "1 main source", score: 5 },
    { text: "2 sources", score: 4 },
    { text: "3 sources", score: 2 },
    { text: "4+ diversified", score: 1 }
  ]},

  { text: "What % of revenue comes from your largest customer/platform?", category: "dependence", options: [
    { text: "80–100%", score: 5 },
    { text: "50–79%", score: 4 },
    { text: "30–49%", score: 3 },
    { text: "<30%", score: 1 }
  ]},

  // DIGITAL RISK
  { text: "How reliant are you on one platform (Instagram, TikTok, Shopify)?", category: "digital", options: [
    { text: "Completely reliant", score: 5 },
    { text: "Mostly reliant", score: 4 },
    { text: "Balanced", score: 2 },
    { text: "Platform-independent", score: 1 }
  ]},

  { text: "Have you ever been locked out or restricted from a key account?", category: "digital", options: [
    { text: "Yes, major impact", score: 5 },
    { text: "Yes, minor impact", score: 3 },
    { text: "No", score: 1 }
  ]},

  // DATA & ASSETS
  { text: "Do you regularly back up key business data?", category: "data", options: [
    { text: "Never", score: 5 },
    { text: "Occasionally", score: 3 },
    { text: "Automated backups", score: 1 }
  ]},

  { text: "If your device was lost today, could you recover everything?", category: "data", options: [
    { text: "No", score: 5 },
    { text: "Somewhat", score: 3 },
    { text: "Yes fully", score: 1 }
  ]},

  // OPERATIONS
  { text: "Can anyone else run your business if you are unavailable?", category: "operations", options: [
    { text: "No", score: 5 },
    { text: "Partially", score: 3 },
    { text: "Yes", score: 1 }
  ]},

  { text: "Do you have documented processes for key tasks?", category: "operations", options: [
    { text: "None", score: 5 },
    { text: "Some notes", score: 3 },
    { text: "Fully documented", score: 1 }
  ]},

  // FINANCIAL
  { text: "How many months could you operate with no income?", category: "financial", options: [
    { text: "<1 month", score: 5 },
    { text: "1–2 months", score: 4 },
    { text: "3–6 months", score: 3 },
    { text: "6+ months", score: 1 }
  ]},

  { text: "Do you have emergency business funds?", category: "financial", options: [
    { text: "No", score: 5 },
    { text: "Some savings", score: 3 },
    { text: "Dedicated reserve", score: 1 }
  ]},

  // RECOVERY
  { text: "Do you have a recovery plan if systems fail?", category: "recovery", options: [
    { text: "No", score: 5 },
    { text: "Informal idea", score: 3 },
    { text: "Written plan", score: 1 }
  ]},

  { text: "Could you restart operations within 48 hours?", category: "recovery", options: [
    { text: "No", score: 5 },
    { text: "Partially", score: 3 },
    { text: "Yes", score: 1 }
  ]},

  // COMMUNICATION
  { text: "If your main social account was lost, could you reach your audience?", category: "comms", options: [
    { text: "No", score: 5 },
    { text: "Partially", score: 3 },
    { text: "Yes (email/SMS list)", score: 1 }
  ]},

  { text: "Do you have crisis communication templates ready?", category: "comms", options: [
    { text: "No", score: 5 },
    { text: "Some drafts", score: 3 },
    { text: "Fully prepared", score: 1 }
  ]}
];

let current = 0;

let scores = {
  dependence: 0,
  digital: 0,
  data: 0,
  operations: 0,
  financial: 0,
  recovery: 0,
  comms: 0
};

let selected = false;

function loadQuestion() {
  const q = questions[current];

  document.getElementById("question").innerText = q.text;
  document.getElementById("progress").innerText = `Question ${current + 1} of ${questions.length}`;

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  selected = false;

  q.options.forEach(opt => {
    const div = document.createElement("div");
    div.className = "option";
    div.innerText = opt.text;

    div.onclick = () => {
      selected = true;
      scores[q.category] += opt.score;
    };

    optionsDiv.appendChild(div);
  });
}

document.getElementById("nextBtn").onclick = (e) => {
  e.preventDefault();

  if (!selected) {
    alert("Please select an option");
    return;
  }

  current++;

  if (current >= questions.length) {
    localStorage.setItem("compassScores", JSON.stringify(scores));
    window.location.href = "result.html";
  } else {
    loadQuestion();
  }
};

loadQuestion();
</script>

</body>
</html>
